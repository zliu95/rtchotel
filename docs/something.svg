<!-- 4 boxes -->
<rect x="180" y="360" width="400" height="140" class="box"/>
<text x="380" y="390" text-anchor="middle" class="text">AI健康引擎</text>

<rect x="660" y="360" width="400" height="140" class="box"/>
<text x="860" y="390" text-anchor="middle" class="text">交易结算中心</text>

<rect x="180" y="520" width="400" height="140" class="box"/>
